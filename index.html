<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamStore Premium</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 4. Lucide Icons -->
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-[#0a0a0c] text-white font-sans selection:bg-purple-500/30">
    
    <div id="root"></div>

    <script type="text/babel">
        // --- ESCUDO ANTI-ERRORES (EVITA LA PANTALLA NEGRA) ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center p-10 text-center">
                            <div className="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mb-6 border border-red-500">
                                <span className="text-red-500 text-3xl font-black">!</span>
                            </div>
                            <h1 className="text-red-500 text-3xl font-bold mb-4">Algo impidió cargar la tienda</h1>
                            <p className="text-gray-400 mb-6">En lugar de una pantalla negra, hemos capturado el error para que puedas solucionarlo:</p>
                            <pre className="bg-gray-900 p-6 rounded-xl text-red-400 w-full max-w-2xl overflow-auto text-left text-sm border border-white/10 shadow-2xl">
                                {this.state.error && this.state.error.toString()}
                            </pre>
                            <button onClick={() => window.location.reload()} className="mt-8 bg-white/10 hover:bg-white/20 px-6 py-3 rounded-full transition-all">Recargar Página</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const { useState, useEffect } = React;
        
        // --- BLINDAJE DE ÍCONOS (SOLUCIÓN AL ERROR 130) ---
        // Si el CDN de iconos falla, usamos un SVG genérico de repuesto para que la página NUNCA colapse.
        const getIcon = (iconName) => {
            if (window.lucideReact && window.lucideReact[iconName]) {
                return window.lucideReact[iconName];
            }
            return (props) => (
                <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                </svg>
            );
        };

        const Play = getIcon('Play');
        const Smartphone = getIcon('Smartphone');
        const Monitor = getIcon('Monitor');
        const Shield = getIcon('Shield');
        const Music = getIcon('Music');
        const Tv = getIcon('Tv');
        const MessageCircle = getIcon('MessageCircle');
        const Star = getIcon('Star');
        const Zap = getIcon('Zap');
        const ChevronRight = getIcon('ChevronRight');
        const ChevronLeft = getIcon('ChevronLeft');
        const Menu = getIcon('Menu');
        const X = getIcon('X');
        const CheckCircle2 = getIcon('CheckCircle2');
        const ShieldCheck = getIcon('ShieldCheck');
        const CreditCard = getIcon('CreditCard');
        const Globe = getIcon('Globe');
        const Sparkles = getIcon('Sparkles');
        const ShoppingCart = getIcon('ShoppingCart');
        const Plus = getIcon('Plus');
        const Minus = getIcon('Minus');
        const Trash2 = getIcon('Trash2');
        const Settings = getIcon('Settings');
        const PlusCircle = getIcon('PlusCircle');
        const Edit3 = getIcon('Edit3');
        const Lock = getIcon('Lock');
        const ImageIcon = getIcon('Image');
        const RefreshCw = getIcon('RefreshCw');
        const CloudUpload = getIcon('CloudUpload');

        const WHATSAPP_NUMBER = "51999999999";

        // ✨ URL DE TU GOOGLE APPS SCRIPT ✨
        const API_URL = "https://script.google.com/macros/s/AKfycbxTO7BwElRHrIs3TqUJ5shqTe049-bJ1s2EGEa4N69eJYhBiNR9kcRy_O-mSgSaf3E/exec";

        const HERO_SLIDES = [
          { id: 1, title: "El Mejor Entretenimiento", subtitle: "Cuentas Premium de Streaming 4K", image: "https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?q=80&w=2070&auto=format&fit=crop", cta: "Ver Catálogo" },
          { id: 2, title: "Música Sin Límites", subtitle: "Spotify Premium a un precio increíble", image: "https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=1974&auto=format&fit=crop", cta: "Explorar Planes" },
          { id: 3, title: "Seguridad Total", subtitle: "Licencias de Antivirus Originales", image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop", cta: "Proteger Ahora" }
        ];

        const CATEGORIES = ["Todos", "Streaming", "Música", "Antivirus", "Productividad", "Licencias", "IPTV"];
        const ICON_MAP = { Tv, Monitor, Play, Sparkles, Music, ShieldCheck, Shield, Globe, Zap, Smartphone };

        function App() {
          const [products, setProducts] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [isSaving, setIsSaving] = useState(false);
          const [dbStatus, setDbStatus] = useState('connecting');

          const [activeCategory, setActiveCategory] = useState("Todos");
          const [currentSlide, setCurrentSlide] = useState(0);
          const [isScrolled, setIsScrolled] = useState(false);
          const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
          
          const [cart, setCart] = useState([]);
          const [isCartOpen, setIsCartOpen] = useState(false);

          const [isAdminView, setIsAdminView] = useState(false);
          const [showPasswordModal, setShowPasswordModal] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          
          const [isEditing, setIsEditing] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [newProduct, setNewProduct] = useState({
            name: "", price: "", category: "Streaming", type: "", desc: "", iconName: "Tv", color: "from-blue-500 to-blue-800", label: "", image: "", puntos: 0
          });

          // BLINDAJE: Asegurar que products SIEMPRE sea un array válido
          const safeProducts = Array.isArray(products) ? products : [];

          useEffect(() => {
            const fetchFromSheets = async () => {
              try {
                setDbStatus('connecting');
                const response = await fetch(API_URL);
                const result = await response.json();
                
                // Validación estricta para evitar crasheos por datos corruptos
                if (result && result.status === "success" && Array.isArray(result.data)) {
                  setProducts(result.data);
                  setDbStatus('connected');
                } else {
                  setProducts([]); 
                  setDbStatus('error');
                }
              } catch (error) {
                console.error("Error cargando de Sheets:", error);
                setProducts([]);
                setDbStatus('error');
              } finally {
                setIsLoading(false);
              }
            };
            fetchFromSheets();
          }, []);

          const syncToSheets = async (updatedProductsArray) => {
            setIsSaving(true);
            setDbStatus('connecting');
            try {
              const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "sync", products: updatedProductsArray })
              });
              const result = await response.json();
              
              if(result && result.status === "success") {
                 setDbStatus('connected');
              } else {
                 setDbStatus('error');
                 alert("Hubo un problema sincronizando con Google Sheets. Los datos se guardaron localmente temporalmente.");
              }
            } catch (error) {
              console.error("Error guardando en Sheets:", error);
              setDbStatus('error');
              alert("Error de conexión al guardar en la nube.");
            } finally {
              setIsSaving(false);
            }
          };

          useEffect(() => {
            const handleScroll = () => setIsScrolled(window.scrollY > 50);
            window.addEventListener("scroll", handleScroll);
            return () => window.removeEventListener("scroll", handleScroll);
          }, []);

          useEffect(() => {
            const timer = setInterval(() => setCurrentSlide((prev) => (prev === HERO_SLIDES.length - 1 ? 0 : prev + 1)), 5000);
            return () => clearInterval(timer);
          }, []);

          const sortedProducts = [...safeProducts].sort((a, b) => {
            const puntosA = parseInt(a.puntos) || 0;
            const puntosB = parseInt(b.puntos) || 0;
            return puntosB - puntosA; 
          });

          const filteredProducts = activeCategory === "Todos" 
            ? sortedProducts 
            : sortedProducts.filter(p => p.category === activeCategory);

          const addToCart = (product) => {
            setCart(prev => {
              const existing = prev.find(item => item.product.id === product.id);
              if (existing) return prev.map(item => item.product.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
              return [...prev, { product, quantity: 1 }];
            });
          };

          const updateQuantity = (productId, delta) => setCart(prev => prev.map(item => {
            if (item.product.id === productId) {
              const newQuantity = item.quantity + delta;
              return newQuantity > 0 ? { ...item, quantity: newQuantity } : item;
            }
            return item;
          }).filter(item => item.quantity > 0));

          const removeFromCart = (productId) => setCart(prev => prev.filter(item => item.product.id !== productId));
          const getCartTotal = () => cart.reduce((total, item) => total + ((parseFloat(item.product.price) || 0) * item.quantity), 0);
          const getCartCount = () => cart.reduce((count, item) => count + item.quantity, 0);

          const handleWhatsAppCheckout = () => {
            if (cart.length === 0) return;
            let message = "Hola, quiero realizar el siguiente pedido:\n\n";
            cart.forEach(item => { message += `• ${item.quantity}x ${item.product.name} (${item.product.type}) - S/${(parseFloat(item.product.price) || 0) * item.quantity}\n`; });
            message += `\n*Total a pagar: S/${getCartTotal()}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
          };

          const handleAdminLogin = (e) => {
            e.preventDefault();
            if (passwordInput === "123456") {
              setIsAdminView(true);
              setShowPasswordModal(false);
              setPasswordInput("");
            } else {
              alert("Contraseña incorrecta");
            }
          };

          const handleSaveProduct = (e) => {
            e.preventDefault();
            let updatedProducts = [];
            
            if (isEditing) {
              updatedProducts = safeProducts.map(p => p.id === editingId ? {
                ...p, name: newProduct.name, price: parseFloat(newProduct.price), category: newProduct.category, type: newProduct.type,
                desc: newProduct.desc, iconName: newProduct.iconName, color: newProduct.color, label: newProduct.label, image: newProduct.image, puntos: parseInt(newProduct.puntos) || 0
              } : p);
              setIsEditing(false);
              setEditingId(null);
            } else {
              const newId = safeProducts.length > 0 ? Math.max(...safeProducts.map(p => parseInt(p.id) || 0)) + 1 : 1;
              const productToAdd = {
                id: newId, name: newProduct.name, price: parseFloat(newProduct.price), category: newProduct.category, type: newProduct.type,
                desc: newProduct.desc, iconName: newProduct.iconName, color: newProduct.color, label: newProduct.label, image: newProduct.image, puntos: parseInt(newProduct.puntos) || 0
              };
              updatedProducts = [productToAdd, ...safeProducts];
            }
            
            setProducts(updatedProducts);
            syncToSheets(updatedProducts);
            
            setNewProduct({ name: "", price: "", category: "Streaming", type: "", desc: "", iconName: "Tv", color: "from-blue-500 to-blue-800", label: "", image: "", puntos: 0 });
          };

          const handleEditClick = (product) => {
            setIsEditing(true);
            setEditingId(product.id);
            setNewProduct({
              name: product.name || "", price: product.price || "", category: product.category || "Streaming", type: product.type || "", desc: product.desc || "", iconName: product.iconName || "Tv", color: product.color || "from-blue-500 to-blue-800", label: product.label || "", image: product.image || "", puntos: product.puntos || 0
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleCancelEdit = () => {
            setIsEditing(false);
            setEditingId(null);
            setNewProduct({ name: "", price: "", category: "Streaming", type: "", desc: "", iconName: "Tv", color: "from-blue-500 to-blue-800", label: "", image: "", puntos: 0 });
          };

          const handleDeleteProduct = (id) => {
            if (window.confirm("¿Estás seguro de eliminar este producto?")) {
              const updatedProducts = safeProducts.filter(p => p.id !== id);
              setProducts(updatedProducts);
              removeFromCart(id);
              syncToSheets(updatedProducts);
            }
          };

          const IconComponent = (iconName) => {
            const Icon = ICON_MAP[iconName] || Tv;
            return <Icon className="w-full h-full text-white/90 drop-shadow-2xl group-hover:scale-110 transition-transform duration-500 relative z-10" />;
          };

          return (
            <div className="min-h-screen relative overflow-x-hidden">
              <div className="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
                <div className="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-600/10 blur-[120px]"></div>
                <div className="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-600/10 blur-[120px]"></div>
              </div>

              <header className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled || isAdminView ? 'bg-[#0a0a0c]/90 backdrop-blur-lg border-b border-white/5 py-3' : 'bg-transparent py-5'}`}>
                <div className="container mx-auto px-6 lg:px-12 flex justify-between items-center">
                  <div className="flex flex-col">
                    <h1 className="text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                      STREAM<span className="text-purple-500">STORE</span>
                    </h1>
                    <span className="text-[10px] text-gray-400 font-medium tracking-widest uppercase">Premium Digital Assets</span>
                  </div>

                  {!isAdminView && (
                    <nav className="hidden md:flex items-center gap-8 text-sm font-medium text-gray-300">
                      {["Inicio", "Catálogo", "Streaming", "Licencias"].map((item) => (
                        <a key={item} href="#" className="hover:text-white transition-colors">{item}</a>
                      ))}
                    </nav>
                  )}

                  <div className="flex items-center gap-4">
                    <div className="hidden md:flex items-center gap-2 mr-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/5">
                      <div className={`w-2 h-2 rounded-full ${dbStatus === 'connected' ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : dbStatus === 'error' ? 'bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse' : 'bg-yellow-500 animate-pulse'}`}></div>
                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                        {dbStatus === 'connected' ? 'Conectado' : dbStatus === 'error' ? 'Error API' : 'Sincronizando'}
                      </span>
                    </div>

                    {isAdminView ? (
                      <div className="flex items-center gap-4">
                        {isSaving && <span className="text-xs text-green-400 flex items-center gap-1 animate-pulse"><CloudUpload className="w-4 h-4"/> Sincronizando...</span>}
                        <button onClick={() => setIsAdminView(false)} className="bg-white/10 hover:bg-white/20 border border-white/10 px-5 py-2 rounded-full text-sm font-bold transition-all text-white flex items-center gap-2">Volver a la Tienda</button>
                      </div>
                    ) : (
                      <button onClick={() => setIsCartOpen(true)} className="relative flex items-center justify-center p-2 text-white hover:text-purple-400 transition-colors">
                        <ShoppingCart className="w-6 h-6" />
                        {getCartCount() > 0 && <span className="absolute top-0 right-0 bg-purple-600 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">{getCartCount()}</span>}
                      </button>
                    )}
                    {!isAdminView && <button className="md:hidden text-white" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>{mobileMenuOpen ? <X /> : <Menu />}</button>}
                  </div>
                </div>
              </header>

              {isAdminView ? (
                <main className="pt-28 pb-20 container mx-auto px-6 lg:px-12 relative z-10 min-h-screen">
                  <div className="mb-10">
                    <h2 className="text-3xl md:text-4xl font-black mb-2 flex items-center gap-3"><Settings className="w-8 h-8 text-purple-500" />Panel de Administración</h2>
                    <p className="text-gray-400">Agrega, edita y organiza tu catálogo. Los cambios se guardan automáticamente en tu Google Sheets.</p>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="bg-[#12141c] border border-white/10 rounded-3xl p-6 lg:col-span-1 h-fit shadow-2xl relative overflow-hidden">
                      {isEditing && <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>}
                      <h3 className="text-xl font-bold mb-6 flex items-center gap-2">
                        {isEditing ? <Edit3 className="w-5 h-5 text-blue-500" /> : <PlusCircle className="w-5 h-5 text-green-500" />}
                        {isEditing ? "Editar Producto" : "Añadir Nuevo Producto"}
                      </h3>
                      
                      <form onSubmit={handleSaveProduct} className="flex flex-col gap-4 text-sm">
                        <div><label className="block text-gray-400 mb-1">Nombre del Servicio</label><input required type="text" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500" placeholder="Ej. Crunchyroll Premium" /></div>
                        
                        <div className="grid grid-cols-2 gap-4">
                          <div><label className="block text-gray-400 mb-1">Precio (S/)</label><input required type="number" min="0" step="0.1" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500" placeholder="15.00" /></div>
                          <div><label className="block text-gray-400 mb-1">Posición / Puntos</label><input type="number" value={newProduct.puntos} onChange={e => setNewProduct({...newProduct, puntos: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-500" placeholder="Ej. 100" /></div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div><label className="block text-gray-400 mb-1">Categoría</label><select value={newProduct.category} onChange={e => setNewProduct({...newProduct, category: e.target.value})} className="w-full bg-[#1a1d27] border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">{CATEGORIES.filter(c => c !== "Todos").map(cat => <option key={cat} value={cat}>{cat}</option>)}</select></div>
                          <div><label className="block text-gray-400 mb-1">Tipo de Plan</label><input required type="text" value={newProduct.type} onChange={e => setNewProduct({...newProduct, type: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500" placeholder="Ej. 1 Pantalla HD" /></div>
                        </div>

                        <div><label className="block text-gray-400 mb-1">Descripción Breve</label><textarea required rows="2" value={newProduct.desc} onChange={e => setNewProduct({...newProduct, desc: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500" placeholder="Beneficios del plan..."></textarea></div>

                        <div><label className="block text-gray-400 mb-1 flex items-center gap-1"><ImageIcon className="w-4 h-4"/> URL de Imagen (Opcional)</label><input type="url" value={newProduct.image} onChange={e => setNewProduct({...newProduct, image: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500" placeholder="https://ejemplo.com/imagen.jpg" /><p className="text-[10px] text-gray-500 mt-1">Recomendado: Imágenes horizontales de 800x400.</p></div>

                        <div className="grid grid-cols-2 gap-4">
                          <div><label className="block text-gray-400 mb-1">Color de Tarjeta</label><select value={newProduct.color} onChange={e => setNewProduct({...newProduct, color: e.target.value})} className="w-full bg-[#1a1d27] border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">
                              <option value="from-blue-500 to-blue-800">Azul Clásico</option><option value="from-red-600 to-red-900">Rojo Netflix</option><option value="from-purple-600 to-purple-900">Morado HBO</option><option value="from-green-500 to-green-800">Verde Spotify</option><option value="from-cyan-500 to-blue-700">Cyan Antivirus</option><option value="from-orange-500 to-red-600">Naranja IPTV</option><option value="from-gray-700 to-black">Gris Oscuro</option>
                          </select></div>
                          <div><label className="block text-gray-400 mb-1">Ícono</label><select value={newProduct.iconName} onChange={e => setNewProduct({...newProduct, iconName: e.target.value})} className="w-full bg-[#1a1d27] border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">
                              {Object.keys(ICON_MAP).map(icon => <option key={icon} value={icon}>{icon}</option>)}
                          </select></div>
                        </div>

                        <div><label className="block text-gray-400 mb-1">Etiqueta</label><select value={newProduct.label} onChange={e => setNewProduct({...newProduct, label: e.target.value})} className="w-full bg-[#1a1d27] border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500">
                            <option value="">Ninguna</option><option value="NUEVO">NUEVO</option><option value="TOP">TOP</option><option value="OFERTA">OFERTA</option><option value="PREMIUM">PREMIUM</option>
                        </select></div>

                        {isEditing ? (
                          <div className="flex gap-2 mt-4">
                            <button type="button" onClick={handleCancelEdit} disabled={isSaving} className="flex-1 bg-white/10 text-white font-bold py-3 rounded-xl hover:bg-white/20 transition-colors">Cancelar</button>
                            <button type="submit" disabled={isSaving} className="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-500 transition-colors flex items-center justify-center gap-2">
                              <Edit3 className="w-5 h-5" /> {isSaving ? "Guardando..." : "Guardar"}
                            </button>
                          </div>
                        ) : (
                          <button type="submit" disabled={isSaving} className="w-full mt-4 bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-3 rounded-xl hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                            <PlusCircle className="w-5 h-5" /> {isSaving ? "Guardando..." : "Agregar"}
                          </button>
                        )}
                      </form>
                    </div>

                    <div className="lg:col-span-2 bg-white/5 border border-white/10 rounded-3xl p-6 overflow-hidden flex flex-col h-fit max-h-[800px]">
                      <h3 className="text-xl font-bold mb-6 flex items-center justify-between">Productos en Tienda<span className="bg-purple-600/30 text-purple-400 text-xs px-3 py-1 rounded-full">{safeProducts.length} Items</span></h3>
                      <div className="overflow-y-auto pr-2 hide-scrollbar flex-1 flex flex-col gap-3">
                        {sortedProducts.map(p => (
                          <div key={p.id} className={`flex items-center justify-between p-4 bg-[#12141c] hover:bg-[#1a1d27] transition-colors rounded-xl border ${editingId === p.id ? 'border-blue-500' : 'border-white/5'} group`}>
                            <div className="flex items-center gap-4">
                              <div className={`w-12 h-12 rounded-lg overflow-hidden bg-gradient-to-br ${p.color} flex items-center justify-center`}>
                                {p.image ? <img src={p.image} className="w-full h-full object-cover" alt="" /> : <div className="w-6 h-6">{IconComponent(p.iconName)}</div>}
                              </div>
                              <div>
                                <h4 className="font-bold text-sm text-white group-hover:text-purple-400 transition-colors">{p.name}</h4>
                                <p className="text-xs text-gray-400">{p.category} • {p.type}</p>
                              </div>
                            </div>
                            <div className="flex items-center gap-6">
                              <div className="flex flex-col items-end"><span className="font-black text-white">S/{p.price}</span><span className="text-[10px] text-yellow-500 flex items-center gap-1"><Star className="w-3 h-3" /> {p.puntos || 0} pts</span></div>
                              <div className="flex gap-1">
                                <button onClick={() => handleEditClick(p)} disabled={isSaving} className="p-2 text-gray-500 hover:text-blue-400 hover:bg-blue-500/10 rounded-full transition-colors"><Edit3 className="w-5 h-5" /></button>
                                <button onClick={() => handleDeleteProduct(p.id)} disabled={isSaving} className="p-2 text-gray-500 hover:text-red-500 hover:bg-red-500/10 rounded-full transition-colors"><Trash2 className="w-5 h-5" /></button>
                              </div>
                            </div>
                          </div>
                        ))}
                        {safeProducts.length === 0 && <p className="text-center text-gray-500 py-10">Tu catálogo está vacío o sincronizando.</p>}
                      </div>
                    </div>
                  </div>
                </main>
              ) : (
                <>
                  <section className="relative h-[85vh] w-full overflow-hidden flex items-center">
                    {HERO_SLIDES.map((slide, index) => (
                      <div key={slide.id} className={`absolute inset-0 transition-opacity duration-1000 ease-in-out ${index === currentSlide ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                        <div className="absolute inset-0 bg-black/60 z-10"></div>
                        <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0c] via-transparent to-[#0a0a0c]/80 z-20"></div>
                        <img src={slide.image} alt={slide.title} className={`w-full h-full object-cover transition-transform duration-[10000ms] ${index === currentSlide ? 'scale-110' : 'scale-100'}`} />
                        <div className="absolute inset-0 z-30 flex items-center">
                          <div className="container mx-auto px-6 lg:px-12 pt-20">
                            <div className="max-w-2xl">
                              <h2 className="text-5xl md:text-7xl font-black mb-4 leading-tight drop-shadow-2xl">{slide.title}</h2>
                              <p className="text-lg md:text-2xl text-gray-300 mb-8 font-light drop-shadow-md">{slide.subtitle}</p>
                              <button className="flex items-center gap-2 bg-gradient-to-r from-purple-600 to-blue-600 text-white px-8 py-4 rounded-full font-bold text-lg hover:-translate-y-1 transition-all"><Zap className="w-5 h-5" />{slide.cta}</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </section>

                  <section className="py-20 container mx-auto px-6 lg:px-12 min-h-[50vh]">
                    <div className="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                      <div>
                        <h3 className="text-3xl md:text-4xl font-black mb-2 flex items-center gap-3">Catálogo Premium <Star className="w-6 h-6 text-yellow-500 fill-yellow-500" /></h3>
                        <p className="text-gray-400">Selecciona el servicio que deseas adquirir</p>
                      </div>
                      <div className="flex flex-nowrap overflow-x-auto pb-2 gap-2 hide-scrollbar w-full md:w-auto">
                        {CATEGORIES.map(cat => (
                          <button key={cat} onClick={() => setActiveCategory(cat)} className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-semibold transition-all ${activeCategory === cat ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-[0_0_15px_rgba(139,92,246,0.4)]' : 'bg-white/5 text-gray-400 hover:bg-white/10 hover:text-white border border-white/5'}`}>{cat}</button>
                        ))}
                      </div>
                    </div>

                    {isLoading ? (
                      <div className="flex flex-col items-center justify-center py-20 text-purple-500">
                        <RefreshCw className="w-12 h-12 animate-spin mb-4" />
                        <p className="font-bold">Conectando con la base de datos...</p>
                      </div>
                    ) : (
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {filteredProducts.map((product) => (
                          <div key={product.id} className="group relative bg-[#12141c] rounded-3xl overflow-hidden border border-white/5 hover:border-white/10 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex flex-col">
                            {product.label && (
                              <div className="absolute top-4 right-4 z-20"><span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${product.label === 'TOP' ? 'bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-lg' : product.label === 'OFERTA' ? 'bg-gradient-to-r from-green-500 to-emerald-500 text-white shadow-lg' : product.label === 'NUEVO' ? 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white shadow-lg' : 'bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-lg'}`}>{product.label}</span></div>
                            )}
                            <div className={`h-40 w-full relative overflow-hidden flex items-center justify-center ${!product.image ? `bg-gradient-to-br ${product.color || 'from-gray-800 to-black'}` : 'bg-black'}`}>
                              {product.image ? (
                                <><div className="absolute inset-0 bg-black/40 group-hover:bg-black/10 transition-colors duration-300 z-10"></div><img src={product.image} alt={product.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" /></>
                              ) : (
                                <><div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-300"></div><div className="w-16 h-16">{IconComponent(product.iconName)}</div><div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div></>
                              )}
                            </div>
                            <div className="p-6 flex-1 flex flex-col relative z-20 bg-[#12141c]">
                              <h4 className="text-lg font-bold leading-tight group-hover:text-purple-400 transition-colors mb-2">{product.name}</h4>
                              <span className="text-xs text-gray-400 font-medium mb-3 flex items-center gap-1"><CheckCircle2 className="w-3 h-3 text-purple-500" /> {product.type}</span>
                              <p className="text-sm text-gray-500 mb-6 flex-1 line-clamp-2">{product.desc}</p>
                              <div className="flex items-center justify-between mt-auto">
                                <div className="flex flex-col"><span className="text-xs text-gray-500 uppercase tracking-wider font-semibold">Precio</span><span className="text-2xl font-black text-white">S/{product.price}</span></div>
                                {cart.find(item => item.product.id === product.id) ? (
                                  <div className="flex items-center gap-3 bg-white/10 rounded-full px-3 py-2 border border-white/10">
                                    <button onClick={() => updateQuantity(product.id, -1)} className="p-1 hover:text-purple-400 transition-colors"><Minus className="w-4 h-4" /></button>
                                    <span className="font-bold w-4 text-center">{cart.find(item => item.product.id === product.id).quantity}</span>
                                    <button onClick={() => updateQuantity(product.id, 1)} className="p-1 hover:text-purple-400 transition-colors"><Plus className="w-4 h-4" /></button>
                                  </div>
                                ) : (
                                  <button onClick={() => addToCart(product)} className="w-12 h-12 rounded-full bg-white/10 hover:bg-purple-600 flex items-center justify-center text-white transition-all border border-white/10 hover:border-purple-500 group-hover:w-auto group-hover:px-5 overflow-hidden">
                                    <ShoppingCart className="w-5 h-5 flex-shrink-0" /><span className="w-0 overflow-hidden whitespace-nowrap text-sm font-bold group-hover:w-auto group-hover:ml-2 transition-all duration-300">Agregar</span>
                                  </button>
                                )}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </section>

                  <footer className="border-t border-white/5 bg-[#050506] pt-16 pb-8">
                    <div className="container mx-auto px-6 lg:px-12">
                      <div className="border-t border-white/5 pt-8 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-gray-500">
                        <p onClick={() => setShowPasswordModal(true)} className="cursor-pointer hover:text-gray-400 transition-colors">© 2026 StreamStore Premium. Todos los derechos reservados.</p>
                        <p className="flex items-center gap-1">Diseñado para velocidad y conversión <Zap className="w-3 h-3 text-yellow-500" /></p>
                      </div>
                    </div>
                  </footer>

                  {getCartCount() > 0 && (
                    <button onClick={() => setIsCartOpen(true)} className="fixed bottom-6 right-6 z-50 md:hidden flex items-center gap-3 bg-gradient-to-r from-purple-600 to-blue-600 text-white px-5 py-3 rounded-full shadow-[0_0_20px_rgba(139,92,246,0.5)] animate-bounce">
                      <div className="relative"><ShoppingCart className="w-6 h-6" /><span className="absolute -top-2 -right-2 bg-white text-purple-600 text-xs font-black w-5 h-5 rounded-full flex items-center justify-center">{getCartCount()}</span></div>
                      <span className="font-bold">S/{getCartTotal()}</span>
                    </button>
                  )}

                  {isCartOpen && (
                    <div className="fixed inset-0 z-[60] flex justify-end">
                      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                      <div className="relative w-full max-w-md bg-[#0f1115] h-full shadow-2xl flex flex-col border-l border-white/10 animate-[slideIn_0.3s_ease-out]">
                        <div className="flex items-center justify-between p-6 border-b border-white/10">
                          <h2 className="text-xl font-bold flex items-center gap-2"><ShoppingCart className="w-6 h-6 text-purple-500" />Tu Pedido</h2>
                          <button onClick={() => setIsCartOpen(false)} className="p-2 hover:bg-white/10 rounded-full transition-colors"><X className="w-6 h-6" /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-4 hide-scrollbar">
                          {cart.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full text-gray-500 gap-4"><ShoppingCart className="w-16 h-16 opacity-20" /><p>Tu carrito está vacío</p></div>
                          ) : (
                            cart.map(item => (
                              <div key={item.product.id} className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                                <div className={`w-12 h-12 rounded-xl overflow-hidden bg-gradient-to-br ${item.product.color || 'from-gray-800 to-black'} flex items-center justify-center flex-shrink-0 relative`}>
                                   {item.product.image ? <img src={item.product.image} className="w-full h-full object-cover" alt="" /> : <div className="w-6 h-6">{IconComponent(item.product.iconName)}</div>}
                                </div>
                                <div className="flex-1"><h4 className="font-bold text-sm line-clamp-1">{item.product.name}</h4><p className="text-purple-400 font-bold text-sm">S/{item.product.price * item.quantity}</p></div>
                                <div className="flex items-center gap-3 bg-black/40 rounded-full px-2 py-1">
                                  <button onClick={() => updateQuantity(item.product.id, -1)} className="p-1 hover:text-white text-gray-400"><Minus className="w-3 h-3" /></button>
                                  <span className="font-bold text-sm w-4 text-center">{item.quantity}</span>
                                  <button onClick={() => updateQuantity(item.product.id, 1)} className="p-1 hover:text-white text-gray-400"><Plus className="w-3 h-3" /></button>
                                </div>
                                <button onClick={() => removeFromCart(item.product.id)} className="p-2 text-red-500 hover:bg-red-500/20 rounded-full transition-colors"><Trash2 className="w-4 h-4" /></button>
                              </div>
                            ))
                          )}
                        </div>
                        {cart.length > 0 && (
                          <div className="p-6 border-t border-white/10 bg-[#0a0a0c]">
                            <div className="flex justify-between items-center mb-6"><span className="text-gray-400">Total a pagar</span><span className="text-3xl font-black">S/{getCartTotal()}</span></div>
                            <button onClick={handleWhatsAppCheckout} className="w-full bg-[#25D366] hover:bg-[#1ebd5a] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(37,211,102,0.3)] transition-all hover:scale-[1.02]"><MessageCircle className="w-6 h-6" /> Enviar pedido</button>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </>
              )}

              {showPasswordModal && (
                <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-sm px-4">
                  <div className="bg-[#12141c] border border-white/10 rounded-3xl p-8 max-w-sm w-full shadow-2xl relative">
                    <button onClick={() => setShowPasswordModal(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white"><X className="w-5 h-5" /></button>
                    <div className="flex justify-center mb-6"><div className="p-4 bg-purple-500/20 rounded-full"><Lock className="w-8 h-8 text-purple-500" /></div></div>
                    <h3 className="text-xl font-bold text-center mb-2">Acceso Restringido</h3>
                    <form onSubmit={handleAdminLogin}>
                      <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="Contraseña" required className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-center tracking-widest focus:outline-none focus:border-purple-500 mb-4" />
                      <button type="submit" className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl transition-all">Desbloquear</button>
                    </form>
                  </div>
                </div>
              )}

              <style>{`.hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }`}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
